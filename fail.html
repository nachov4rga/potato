<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #050c18;
            --panel: rgba(15, 31, 61, 0.78);
            --border: rgba(212, 175, 55, 0.28);
            --text: #e8edf4;
            --muted: #b8c5d9;
            --accent: #d4af37;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(212, 175, 55, 0.12), transparent 35%),
                linear-gradient(135deg, var(--bg), #0a1628);
            color: var(--text);
        }

        main {
            max-width: 38rem;
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 1rem;
            font-size: clamp(2rem, 6vw, 3rem);
        }

        p {
            margin: 0 0 1.25rem;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main>
        <h1>That page could not be found.</h1>
        <p>The portfolio files are still here, but this URL does not point to an active page.</p>
        <p><a href="./index.html">Return to the homepage</a></p>
    </main>
</body>
</html>
